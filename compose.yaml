services:
  videodub:
    build:
      context: .
      dockerfile: Dockerfile
    image: videodub:latest
    container_name: videodub
    ports:
      - "7860:7860"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - QWEN_ASR_MODEL=${QWEN_ASR_MODEL:-Qwen/Qwen3-ASR-0.6B}
      - QWEN_TTS_MODEL=${QWEN_TTS_MODEL:-Qwen/Qwen3-TTS-12Hz-1.7B-Base}
      - LATENTSYNC_STEPS=${LATENTSYNC_STEPS:-20}
      - LATENTSYNC_GUIDANCE=${LATENTSYNC_GUIDANCE:-1.5}
      - QWEN_TTS_MAX_NEW_TOKENS=${QWEN_TTS_MAX_NEW_TOKENS:-2048}
      - QWEN_TTS_X_VECTOR_ONLY=${QWEN_TTS_X_VECTOR_ONLY:-1}
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      # Persistent model cache (avoid re-downloading)
      - videodub_cache:/app/cache
      # LatentSync checkpoints (can be pre-populated)
      - videodub_ckpts:/app/LatentSync/checkpoints
      # Output runs directory
      - ./runs:/app/runs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    shm_size: '8gb'

volumes:
  videodub_cache:
  videodub_ckpts:
